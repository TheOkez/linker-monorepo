name: Linker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: Dependency Audit ───────────────────────────────────────────────
  npm-audit:
    name: npm audit (SCA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit backend
        working-directory: backend
        run: |
          npm ci
          npm audit || true

      - name: Audit frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit || true

  # ─── JOB 2: Docker Build & Trivy Scan ─────────────────────────────────────
  build-and-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: npm-audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -t linker-frontend:ci ./frontend

      - name: Build backend image
        run: docker build -t linker-backend:ci ./backend

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: linker-frontend:ci
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: linker-backend:ci
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ─── JOB 3: Push to Docker Hub (main push only) ───────────────────────────
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/linker-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/linker-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/linker-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/linker-frontend:${{ github.sha }}
